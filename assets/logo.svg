<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 44" width="260" height="44" role="img" aria-label="SENSE">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff5c5c"/>
      <stop offset="100%" style="stop-color:#c41e3a"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5eb8ff"/>
      <stop offset="100%" style="stop-color:#3d7aef"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- marca: tr�s faixas + ponto (fluxo / radar) -->
  <g transform="translate(2,4)" filter="url(#glow)">
    <rect x="0" y="0" width="32" height="4" rx="1" fill="url(#g1)"/>
    <rect x="4" y="10" width="28" height="4" rx="1" fill="url(#g2)" opacity="0.95"/>
    <rect x="0" y="20" width="24" height="4" rx="1" fill="url(#g1)" opacity="0.85"/>
    <circle cx="30" cy="22" r="3" fill="#ffd56b"/>
  </g>
  <!-- wordmark -->
  <text x="46" y="30" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="800" letter-spacing="0.28em" fill="url(#g1)">SENSE</text>
  <text x="46" y="30" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="800" letter-spacing="0.28em" fill="none" stroke="#ff8a8a" stroke-width="0.35" opacity="0.45">SENSE</text>
</svg>
